<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - AI Ad Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
        }
        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            background: rgba(20, 20, 30, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            overflow-y: auto;
        }
        .sidebar .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #6c3bf7, #00c6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        .sidebar .nav-item {
            padding: 12px 16px;
            margin: 4px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            color: rgba(255, 255, 255, 0.6);
        }
        .sidebar .nav-item:hover,
        .sidebar .nav-item.active {
            background: rgba(108, 59, 247, 0.15);
            color: #fff;
        }
        .main-content {
            margin-left: 250px;
            padding: 30px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 20px;
            border-radius: 12px;
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #00c6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-card .label {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            margin-top: 4px;
        }
        .table-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        th {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
        }
        .status-badge.completed {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }
        .status-badge.pending {
            background: rgba(255, 193, 7, 0.2);
            color: #FFC107;
        }
        .status-badge.processing {
            background: rgba(33, 150, 243, 0.2);
            color: #2196F3;
        }
        .status-badge.failed {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
            background: rgba(108, 59, 247, 0.3);
            color: #a78bfa;
        }
        .btn:hover {
            background: rgba(108, 59, 247, 0.5);
        }
        .btn-danger {
            background: rgba(244, 67, 54, 0.3);
            color: #f44336;
        }
        .btn-danger:hover {
            background: rgba(244, 67, 54, 0.5);
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
        }
        .modal-content h3 {
            margin-bottom: 15px;
        }
        .modal-content .btn {
            margin: 5px;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.3);
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 12px;
            background: rgba(20, 20, 30, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 999;
            display: none;
        }
        .toast.success {
            display: block;
            border-left: 4px solid #4CAF50;
        }
        .toast.error {
            display: block;
            border-left: 4px solid #f44336;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">🎬 AI Admin</div>
        <div class="nav-item active" onclick="loadDashboard()">📊 Dashboard</div>
        <div class="nav-item" onclick="loadUsers()">👥 Users</div>
        <div class="nav-item" onclick="loadVideos()">🎬 Videos</div>
        <div class="nav-item" onclick="loadAnalytics()">📈 Analytics</div>
        <div style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px;">
            <div class="nav-item" onclick="window.location.href='/app'" style="color: #6c3bf7;">🔙 Back to App</div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div id="content">
            <div class="loading">Loading dashboard...</div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

  <script>
    const API_URL = 'http://localhost:8000/api/v1';
    let currentView = 'dashboard';

    // ===== GET USER ID FROM LOCALSTORAGE =====
    function getUserId() {
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (user && user.phone) {
            return user.phone;
        }
        // Fallback for testing
        return '+919999999999';
    }

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = `toast ${type}`;
        setTimeout(() => {
            toast.className = 'toast';
        }, 3000);
    }

    // ===== FETCH WITH X-USER-ID HEADER =====
    async function fetchAPI(endpoint) {
        try {
            const userId = getUserId();
            const response = await fetch(`${API_URL}${endpoint}`, {
                headers: {
                    'X-User-ID': userId
                }
            });
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return await response.json();
        } catch (error) {
            showToast(`Error: ${error.message}`, 'error');
            return null;
        }
    }

    // ===== LOAD DASHBOARD =====
    async function loadDashboard() {
        currentView = 'dashboard';
        const content = document.getElementById('content');
        content.innerHTML = '<div class="loading">Loading dashboard...</div>';

        try {
            const [users, tasks, analytics] = await Promise.all([
                fetchAPI('/users'),
                fetchAPI('/tasks'),
                fetchAPI('/analytics')
            ]);

            const totalUsers = users ? users.total || 0 : 0;
            const totalTasks = tasks ? tasks.total_tasks || 0 : 0;

            content.innerHTML = `
                <h2 style="margin-bottom: 20px;">📊 Dashboard</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="number">${totalUsers}</div>
                        <div class="label">Total Users</div>
                    </div>
                    <div class="stat-card">
                        <div class="number">${totalTasks}</div>
                        <div class="label">Total Videos</div>
                    </div>
                    <div class="stat-card">
                        <div class="number">${analytics ? analytics.completed || 0 : 0}</div>
                        <div class="label">Completed</div>
                    </div>
                    <div class="stat-card">
                        <div class="number">${analytics ? analytics.success_rate || '0%' : '0%'}</div>
                        <div class="label">Success Rate</div>
                    </div>
                </div>
                <div class="table-container">
                    <h3 style="margin-bottom: 15px;">📋 Recent Activity</h3>
                    ${analytics && analytics.recent_activity && analytics.recent_activity.length > 0 ? `
                        <table>
                            <thead>
                                <tr>
                                    <th>Product</th>
                                    <th>Status</th>
                                    <th>Created</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${analytics.recent_activity.map(item => `
                                    <tr>
                                        <td>${item.product || 'Unknown'}</td>
                                        <td><span class="status-badge ${item.status || 'pending'}">${item.status || 'pending'}</span></td>
                                        <td>${new Date(item.created).toLocaleString()}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    ` : '<p style="color:rgba(255,255,255,0.3);">No recent activity</p>'}
                </div>
            `;
        } catch (error) {
            content.innerHTML = `<div class="loading" style="color: #f44336;">Error loading dashboard: ${error.message}</div>`;
        }
    }

    // ===== LOAD USERS =====
    async function loadUsers() {
        currentView = 'users';
        const content = document.getElementById('content');
        content.innerHTML = '<div class="loading">Loading users...</div>';

        const data = await fetchAPI('/users');
        if (!data || !data.users) {
            content.innerHTML = '<div class="loading">No users found</div>';
            return;
        }

        content.innerHTML = `
            <h2 style="margin-bottom: 20px;">👥 Users</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Phone</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Credits</th>
                            <th>Videos</th>
                            <th>Joined</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.users.map(user => `
                            <tr>
                                <td>${user.id}</td>
                                <td>${user.name || 'N/A'}</td>
                                <td>${user.email || 'N/A'}</td>
                                <td><strong>${user.credits || 0}</strong></td>
                                <td>${user.total_videos || 0}</td>
                                <td>${user.created_at ? new Date(user.created_at).toLocaleDateString() : 'N/A'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    // ===== LOAD VIDEOS =====
    async function loadVideos() {
        currentView = 'videos';
        const content = document.getElementById('content');
        content.innerHTML = '<div class="loading">Loading videos...</div>';

        const data = await fetchAPI('/tasks');
        if (!data || !data.tasks) {
            content.innerHTML = '<div class="loading">No videos found</div>';
            return;
        }

        content.innerHTML = `
            <h2 style="margin-bottom: 20px;">🎬 Videos</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Task ID</th>
                            <th>Product</th>
                            <th>Status</th>
                            <th>Progress</th>
                            <th>Created</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.tasks.map(task => `
                            <tr>
                                <td style="font-size:12px;">${task.id ? task.id.slice(0, 12) : 'N/A'}</td>
                                <td>${task.product || 'N/A'}</td>
                                <td><span class="status-badge ${task.status || 'pending'}">${task.status || 'pending'}</span></td>
                                <td>${task.progress || 0}%</td>
                                <td>${task.created ? new Date(task.created).toLocaleString() : 'N/A'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                ${data.total_tasks > 10 ? `<p style="color:rgba(255,255,255,0.3); margin-top:10px;">Showing first 10 of ${data.total_tasks} tasks</p>` : ''}
            </div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="btn btn-danger" onclick="clearAllTasks()">🗑️ Clear All Tasks</button>
                <button class="btn" onclick="resetDemo()">🔄 Reset Demo</button>
            </div>
        `;
    }

    // ===== LOAD ANALYTICS =====
    async function loadAnalytics() {
        currentView = 'analytics';
        const content = document.getElementById('content');
        content.innerHTML = '<div class="loading">Loading analytics...</div>';

        const data = await fetchAPI('/analytics');
        if (!data) {
            content.innerHTML = '<div class="loading">No analytics data</div>';
            return;
        }

        content.innerHTML = `
            <h2 style="margin-bottom: 20px;">📈 Analytics</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="number">${data.total_generations || 0}</div>
                    <div class="label">Total Generations</div>
                </div>
                <div class="stat-card">
                    <div class="number">${data.completed || 0}</div>
                    <div class="label">Completed</div>
                </div>
                <div class="stat-card">
                    <div class="number">${data.failed || 0}</div>
                    <div class="label">Failed</div>
                </div>
                <div class="stat-card">
                    <div class="number">${data.success_rate || '0%'}</div>
                    <div class="label">Success Rate</div>
                </div>
            </div>
            <div class="table-container">
                <h3 style="margin-bottom: 15px;">📊 Platform Distribution</h3>
                ${data.platform_distribution ? `
                    <table>
                        <thead>
                            <tr>
                                <th>Platform</th>
                                <th>Count</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${Object.entries(data.platform_distribution).map(([platform, count]) => `
                                <tr>
                                    <td>${platform}</td>
                                    <td>${count}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                ` : '<p style="color:rgba(255,255,255,0.3);">No platform data</p>'}
            </div>
            <div style="margin-top: 20px;">
                <p>💰 Credits remaining: <strong>${data.credits_remaining || 0}</strong></p>
            </div>
        `;
    }

    // ===== ADMIN ACTIONS =====
    async function clearAllTasks() {
        if (!confirm('⚠️ Are you sure you want to delete ALL tasks? This cannot be undone!')) return;
        
        const userId = getUserId();
        const response = await fetch(`${API_URL}/tasks/clear?confirm=true`, {
            method: 'DELETE',
            headers: {
                'X-User-ID': userId
            }
        });
        
        if (response.ok) {
            showToast('✅ All tasks cleared!', 'success');
            loadVideos();
        } else {
            showToast('❌ Failed to clear tasks', 'error');
        }
    }

    async function resetDemo() {
        if (!confirm('⚠️ Reset all demo data?')) return;
        
        const userId = getUserId();
        const response = await fetch(`${API_URL}/reset-demo`, {
            method: 'POST',
            headers: {
                'X-User-ID': userId
            }
        });
        
        if (response.ok) {
            showToast('✅ Demo data reset!', 'success');
            loadDashboard();
        } else {
            showToast('❌ Failed to reset demo', 'error');
        }
    }

    function logout() {
        localStorage.removeItem('access_token');
        localStorage.removeItem('user');
        localStorage.removeItem('user_phone');
        showToast('Logged out successfully', 'success');
        setTimeout(() => {
            window.location.href = '/login';
        }, 1000);
    }

    // ===== CHECK LOGIN STATUS =====
    document.addEventListener('DOMContentLoaded', function() {
        const token = localStorage.getItem('access_token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        
        if (!token || !user) {
            showToast('Please login first', 'error');
            setTimeout(() => {
                window.location.href = '/login';
            }, 1500);
            return;
        }
        
        // Show user info in sidebar
        const userDisplay = document.createElement('div');
        userDisplay.style.cssText = `
            padding: 12px 16px;
            margin: 10px 0;
            border-radius: 8px;
            background: rgba(108, 59, 247, 0.1);
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        `;
        userDisplay.innerHTML = `👤 ${user.name || user.phone}`;
        
        const sidebar = document.querySelector('.sidebar');
        const backButton = sidebar.querySelector('[style*="margin-top: 20px;"]');
        if (backButton) {
            sidebar.insertBefore(userDisplay, backButton);
        }
        
        // Add logout button
        const logoutDiv = document.createElement('div');
        logoutDiv.style.cssText = 'margin-top: 10px;';
        logoutDiv.innerHTML = `
            <div class="nav-item" onclick="logout()" style="color: #f44336; cursor: pointer;">
                🚪 Logout
            </div>
        `;
        sidebar.appendChild(logoutDiv);
        
        // Load dashboard
        loadDashboard();
    });
</script>
</body>
</html>
