<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Assistant - Ad Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 20px 0;
            background: linear-gradient(135deg, #6c3bf7, #00c6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
            font-weight: 800;
        }
        .chat-container {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 20px;
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
        }
        .message {
            margin: 10px 0;
            padding: 14px 18px;
            border-radius: 12px;
            max-width: 85%;
            word-wrap: break-word;
            line-height: 1.7;
        }
        .user-message {
            background: rgba(108,59,247,0.2);
            border: 1px solid rgba(108,59,247,0.2);
            margin-left: auto;
            text-align: right;
            color: #c4b5fd;
        }
        .ai-message {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            color: #e5e7eb;
        }
        .ai-message .bullet {
            display: block;
            padding: 4px 0 4px 8px;
            font-size: 14px;
            line-height: 1.6;
            border-left: 2px solid rgba(108,59,247,0.3);
            margin: 2px 0;
        }
        .ai-message .bullet-emoji {
            margin-right: 6px;
        }
        .ai-message .section-title {
            color: #a78bfa;
            font-weight: 600;
            font-size: 15px;
            display: block;
            margin: 8px 0 4px 0;
        }
        .input-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .input-container input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .input-container input:focus {
            outline: none;
            border-color: #6c3bf7;
        }
        .input-container input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .input-container button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #6c3bf7, #4f0bc7);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }
        .input-container button:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(108,59,247,0.3);
        }
        .input-container button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .loading {
            color: rgba(255,255,255,0.3);
            font-style: italic;
            padding: 10px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: rgba(255,255,255,0.3);
            text-decoration: none;
            transition: 0.3s;
            font-size: 14px;
        }
        .back-link:hover {
            color: rgba(255,255,255,0.7);
        }
        .quick-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .quick-actions button {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }
        .quick-actions button:hover {
            background: rgba(108,59,247,0.15);
            border-color: rgba(108,59,247,0.3);
            color: #fff;
        }
        .welcome-text {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            line-height: 1.8;
        }
        .welcome-text .highlight {
            color: #a78bfa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">🤖 AI Ad Assistant</div>
        
        <div class="quick-actions">
            <button onclick="sendQuickMessage('Write a product description for a smartwatch')">⌨️ Description</button>
            <button onclick="sendQuickMessage('Create a TikTok ad script for headphones')">🎬 Ad Script</button>
            <button onclick="sendQuickMessage('Suggest product features for a fitness tracker')">💡 Features</button>
            <button onclick="sendQuickMessage('Write a catchy slogan for a water bottle')">📣 Slogan</button>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message ai-message">
                <div class="welcome-text">
                    👋 Hello! I'm your <span class="highlight">AI Ad Assistant</span>.<br><br>
                    Ask me about:<br>
                    • Product descriptions<br>
                    • Ad scripts for TikTok/Instagram/YouTube<br>
                    • Marketing ideas<br>
                    • Product features & benefits
                </div>
            </div>
        </div>

        <div class="input-container">
            <input type="text" id="userInput" placeholder="Ask me anything..." 
                   onkeypress="if(event.key==='Enter') sendMessage()" />
            <button onclick="sendMessage()" id="sendBtn">Send</button>
        </div>

        <a href="/app" class="back-link">← Back to Ad Generator</a>
    </div>

    <script>
        const API_BASE = '/api/v1/ai';

        function getUserId() {
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            return user?.phone || localStorage.getItem('user_phone') || null;
        }

        function formatAIText(text) {
    // Split by lines
    const lines = text.split('\n');
    let html = '';
    let inBulletList = false;
    
    for (const line of lines) {
        const clean = line.trim();
        if (!clean) {
            if (inBulletList) {
                html += '</div>';
                inBulletList = false;
            }
            continue;
        }
        
        // Check if it's a section header (##)
        if (clean.startsWith('##')) {
            if (inBulletList) {
                html += '</div>';
                inBulletList = false;
            }
            const headerText = clean.replace(/^##\s*/, '');
            html += `<div style="color: #a78bfa; font-weight: 600; font-size: 15px; margin: 12px 0 6px 0; display: block;">${headerText}</div>`;
            continue;
        }
        
        // Check if it's bold (**text**)
        if (clean.includes('**')) {
            const boldText = clean.replace(/\*\*(.*?)\*\*/g, '<strong style="color: #00c6ff;">$1</strong>');
            html += `<div style="padding: 2px 0; line-height: 1.6;">${boldText}</div>`;
            continue;
        }
        
        // Check if it's a bullet point
        if (clean.startsWith('•') || clean.startsWith('*') || clean.startsWith('-')) {
            const bulletText = clean.replace(/^[\*\-•]\s*/, '');
            // Check if bullet has a colon (feature: explanation)
            if (bulletText.includes(':')) {
                const parts = bulletText.split(':');
                const title = parts[0].trim();
                const desc = parts.slice(1).join(':').trim();
                html += `<div style="padding: 3px 0 3px 8px; border-left: 2px solid rgba(108,59,247,0.3); margin: 2px 0; line-height: 1.6;">
                    <strong style="color: #a78bfa;">${title}</strong>: ${desc}
                </div>`;
            } else {
                html += `<div style="padding: 3px 0 3px 8px; border-left: 2px solid rgba(108,59,247,0.2); margin: 2px 0; line-height: 1.6;">
                    ${bulletText}
                </div>`;
            }
            inBulletList = true;
            continue;
        }
        
        // Regular text
        if (inBulletList) {
            html += '</div>';
            inBulletList = false;
        }
        html += `<div style="padding: 2px 0; line-height: 1.7;">${clean}</div>`;
    }
    
    if (inBulletList) {
        html += '</div>';
    }
    
    return html || text;
}

        function addMessage(text, type) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = `message ${type}-message`;
            
            if (type === 'ai') {
                div.innerHTML = formatAIText(text);
            } else {
                div.textContent = text;
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function addLoading() {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = 'loading';
            div.id = 'loadingMessage';
            div.textContent = '🤔 Thinking...';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function removeLoading() {
            const loading = document.getElementById('loadingMessage');
            if (loading) loading.remove();
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.textContent = '⏳';

            addMessage(message, 'user');
            input.value = '';
            addLoading();

            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-User-ID': getUserId() || '+919999999999'
                    },
                    body: JSON.stringify({ prompt: message })
                });

                const data = await response.json();
                removeLoading();

                if (data.status === 'success') {
                    addMessage(data.response, 'ai');
                } else {
                    addMessage('❌ ' + (data.message || 'Something went wrong'), 'ai');
                }

            } catch (error) {
                removeLoading();
                addMessage('❌ Error: ' + error.message, 'ai');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send';
            }
        }

        async function sendQuickMessage(message) {
            document.getElementById('userInput').value = message;
            await sendMessage();
        }

        document.addEventListener('DOMContentLoaded', function() {
            const user = localStorage.getItem('user');
            if (!user) {
                const container = document.getElementById('chatContainer');
                const div = document.createElement('div');
                div.className = 'message ai-message';
                div.innerHTML = `
                    <div class="welcome-text">
                        🔐 Please <span class="highlight">login</span> to use the AI Assistant.<br>
                        <a href="/login" style="color: #a78bfa; text-decoration: underline;">Go to Login →</a>
                    </div>
                `;
                container.appendChild(div);
            }
        });
    </script>
</body>
</html>
